<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Fragging in Texas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=IM+Fell+English:ital@0;1&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="w-screen h-screen flex flex-col justify-between relative bg-black text-amber-100/90 overflow-hidden select-none">
    <canvas id="emberCanvas"></canvas>
    <header class="relative z-20 flex justify-end items-center p-4 md:p-6 opacity-75 hover:opacity-100 transition-opacity">
        <div class="flex items-center space-x-3 ui-font text-xs">
            <button id="audioBtn" class="p-2 rounded-full bg-stone-900/80 border border-stone-800 text-stone-400 hover:text-amber-400 hover:border-amber-700/50 transition-all flex items-center gap-1.5 px-3" title="Toggle Wind Ambience">
                <img src="./svg/d.svg" width="24px" height="24px">
                <span id="audioLabel" class="hidden sm:inline">Ambience</span>
            </button>
            <button id="textSizeBtn" class="p-2 rounded-full bg-stone-900/80 border border-stone-800 text-stone-400 hover:text-amber-400 hover:border-amber-700/50 transition-all px-3 flex items-center gap-1" title="Adjust Text Size">
                <span class="text-xs font-bold">A</span>
                <span class="text-base font-bold">A</span>
            </button>
            <button id="fullscreenBtn" class="p-2 rounded-full bg-stone-900/80 border border-stone-800 text-stone-400 hover:text-amber-400 hover:border-amber-700/50 transition-all" title="Toggle Fullscreen">
                <img src="./svg/c.svg" width="24px" height="24px">
            </button>
        </div>
    </header>
    <main id="tapArea" class="relative z-10 flex-1 flex flex-col justify-center items-center px-6 sm:px-12 md:px-20 max-w-4xl mx-auto w-full cursor-pointer group">
        <div id="slideBox" class="w-full text-center transition-all duration-300 transform fade-enter-active">
            <h1 id="slideTitle" class="title-font text-3xl sm:text-4xl md:text-5xl font-bold tracking-wider text-amber-500 mb-6 text-glow hidden">
                A Fragging in Texas
            </h1>
            <div id="slideContent" class="text-xl sm:text-2xl md:text-3xl leading-relaxed sm:leading-loose text-stone-200 font-serif tracking-wide select-none"></div>
            <p id="slideSubtitle" class="mt-6 text-sm sm:text-base ui-font text-amber-600/80 font-light italic tracking-widest hidden max-w-lg mx-auto"></p>
        </div>
        <div id="tapHint" class="absolute bottom-4 left-1/2 transform -translate-x-1/2 ui-font text-xs text-stone-600 tracking-widest uppercase flex items-center gap-2 opacity-60 group-hover:opacity-100 transition-opacity">
            <span>Tap screen or press space</span>
            <img src="./svg/b.svg" width="24px" height="24px">
        </div>
        <div id="endControls" class="hidden flex-col items-center gap-4 mt-8 z-30">
            <button id="restartBtn" class="ui-font px-8 py-3 bg-amber-700 hover:bg-amber-600 active:scale-95 text-stone-950 font-bold tracking-wider uppercase rounded-full shadow-lg shadow-amber-900/40 transition-all flex items-center gap-2">
                <img src="./svg/read_again.svg" width="24px" height="24px">
                Read Again
            </button>
        </div>
    </main>
    <footer class="relative z-20 w-full p-4 md:p-6 flex flex-col items-center gap-2 bg-gradient-to-t from-black via-black/90 to-transparent">
        <div class="w-full max-w-xs sm:max-w-md h-1 bg-stone-900 rounded-full overflow-hidden mb-1">
            <div id="progressBar" class="h-full bg-gradient-to-r from-amber-800 to-amber-500 w-0 transition-all duration-300"></div>
        </div>

        <div class="w-full max-w-md flex justify-between items-center ui-font text-xs text-stone-500">
            <button id="prevBtn" class="hover:text-amber-400 disabled:opacity-20 disabled:hover:text-stone-500 transition-colors flex items-center gap-1 p-2">
                <img src="./svg/g.svg" width="24px" height="24px">
                <span>Back</span>
            </button>
            <div id="slideCounter" class="font-mono text-stone-400 font-medium tracking-widest bg-stone-900/80 px-3 py-1 rounded-full border border-stone-800/80">
                1 / --
            </div>
            <button id="nextBtn" class="hover:text-amber-400 disabled:opacity-20 disabled:hover:text-stone-500 transition-colors flex items-center gap-1 p-2">
                <span>Next</span>
                <img src="./svg/f.svg" width="24px" height="24px">
            </button>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
